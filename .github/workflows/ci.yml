name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: read

env:
  GOPRIVATE: github.com/GoCodeAlone/*
  GONOSUMCHECK: github.com/GoCodeAlone/*

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build
        run: go build ./...

  windows-build:
    name: Windows Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build Windows binaries
        run: |
          out="$(mktemp -d "$RUNNER_TEMP/ratchet-windows-XXXXXX")"
          GOOS=windows GOARCH=amd64 go build -o "$out/ratchet-windows-amd64.exe" ./cmd/ratchet
          GOOS=windows GOARCH=arm64 go build -o "$out/ratchet-windows-arm64.exe" ./cmd/ratchet

  windows-release-smoke:
    name: Windows Release Smoke
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build and run Windows command binary
        run: |
          $out = Join-Path $env:RUNNER_TEMP "ratchet-release-smoke"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $exe = Join-Path $out "ratchet.exe"
          go build -o $exe ./cmd/ratchet
          & $exe --version
          & $exe help

  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check
      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
      - name: Check release artifacts
        run: scripts/check-release-artifacts.sh --manifest-only dist
      - name: Upload snapshot dist
        uses: actions/upload-artifact@v4
        with:
          name: ratchet-snapshot-dist
          path: dist

  tui-smoke:
    name: TUI Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Run untagged smoke tests
        run: go test ./cmd/ratchet ./internal/tui -run 'HarnessSmoke|TUIBinarySmoke|StartupSmoke' -count=1 -timeout=10m
      - name: Run tagged client smoke tests
        run: go test -tags tui_smoke ./internal/client -run 'ConnectSmokeUnix' -count=1
      - name: Run tagged daemon smoke tests
        run: go test -tags tui_smoke ./internal/daemon -run 'SmokeService|ListJobs' -count=1
      - name: Run production provider durability smoke
        run: go test ./cmd/ratchet -run 'HarnessSmokeDurableProviderSaveRestart' -count=1 -timeout=12m
      - name: Run production provider downgrade smoke
        shell: bash
        env:
          RATCHET_DOWNGRADE_BASE_SHA: 8cb5602166ffe529a0f05101dff583bad0919415
        run: |
          log=$(mktemp)
          trap 'rm -f "$log"' EXIT
          if ! go test -json ./cmd/ratchet -run '^TestHarnessSmokeDurableProviderDowngrade$' -count=1 -timeout=12m >"$log"; then
            jq -c 'select(.Action == "fail" or .Action == "skip") | {Action,Package,Elapsed}' "$log" >&2 || true
            exit 1
          fi
          jq -e 'select(.Action == "pass" and .Test == "TestHarnessSmokeDurableProviderDowngrade")' "$log" >/dev/null

  windows-conpty-smoke:
    name: Windows ConPTY Smoke
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Run Windows ACP background persistence tests
        run: go test ./internal/acpclient -run '^TestBackgroundWindows' -count=1
      - name: Run Windows managed policy security tests
        run: go test ./internal/hooks -run 'Managed|SecurePolicy' -count=1
      - name: Run Windows daemon lock tests
        run: go test ./internal/daemon -run 'DaemonLock' -count=1
      - name: Run Windows ConPTY provider save
        run: go test -tags tui_smoke ./internal/tui -run 'WindowsConPTYProviderSave' -count=1 -timeout=10m
      - name: Run Windows ConPTY smoke tests
        run: go test -tags tui_smoke ./internal/client ./internal/daemon ./internal/tui -run 'ConnectSmokeLoopback|SmokeServiceLoopback|WindowsConPTY' -count=1 -timeout=10m

  tap-preflight:
    name: Tap Preflight
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Clone Homebrew tap
        run: gh repo clone GoCodeAlone/homebrew-tap "$RUNNER_TEMP/homebrew-tap"
      - name: Run tap preflight
        run: |
          RATCHET_RELEASE_GUARD_MODE=tap-preflight \
            RATCHET_RELEASE_GUARD_TAP="$RUNNER_TEMP/homebrew-tap" \
            go test -count=1 ./internal/releaseguard -run TestTapPreflight

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Go vet
        run: go vet ./...
