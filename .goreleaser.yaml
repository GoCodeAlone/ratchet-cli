version: 2

builds:
  - id: ratchet
    main: ./cmd/ratchet
    binary: ratchet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/GoCodeAlone/ratchet-cli/internal/version.Version={{.Version}}
      - -X github.com/GoCodeAlone/ratchet-cli/internal/version.Commit={{.Commit}}
      - -X github.com/GoCodeAlone/ratchet-cli/internal/version.Date={{.Date}}

archives:
  - id: ratchet
    builds: [ratchet]
    format: tar.gz
    name_template: "ratchet_{{ .Os }}_{{ .Arch }}"
    files:
      - RATCHET.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
