version: 2

builds:
  - id: ratchet
    main: ./cmd/ratchet
    binary: ratchet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/GoCodeAlone/ratchet-cli/internal/version.Version={{.Version}}
      - -X github.com/GoCodeAlone/ratchet-cli/internal/version.Commit={{.Commit}}
      - -X github.com/GoCodeAlone/ratchet-cli/internal/version.Date={{.Date}}

archives:
  - id: ratchet
    ids: [ratchet]
    formats: [tar.gz]
    name_template: "ratchet_{{ .Os }}_{{ .Arch }}"
    files:
      - RATCHET.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: ratchet-cli
    ids: [ratchet]
    homepage: "https://github.com/GoCodeAlone/ratchet-cli"
    description: "Interactive AI agent CLI"
    license: "Apache-2.0"
    repository:
      owner: GoCodeAlone
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "ratchet"
    post_install: |
      # Ad-hoc codesign so macOS Gatekeeper allows execution
      if OS.mac?
        system "codesign", "--force", "--sign", "-", "#{bin}/ratchet"
      end
