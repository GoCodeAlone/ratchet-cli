syntax = "proto3";

package ratchet;

option go_package = "github.com/GoCodeAlone/ratchet-cli/internal/proto";

import "google/protobuf/timestamp.proto";

// === Messages ===

message Empty {}

message Session {
  string id = 1;
  string name = 2;
  string status = 3; // active, background, completed
  string working_dir = 4;
  string provider = 5;
  string model = 6;
  google.protobuf.Timestamp created_at = 7;
  int32 active_agents = 8;
}

message CreateSessionReq {
  string initial_prompt = 1;
  string working_dir = 2;
  string provider = 3;
  string model = 4;
}

message SessionList {
  repeated Session sessions = 1;
}

message AttachReq {
  string session_id = 1;
}

message DetachReq {
  string session_id = 1;
}

message KillReq {
  string session_id = 1;
}

// Chat streaming
message SendMessageReq {
  string session_id = 1;
  string content = 2;
}

message ChatEvent {
  oneof event {
    TokenDelta token = 1;
    ToolCallStart tool_start = 2;
    ToolCallResult tool_result = 3;
    PermissionRequest permission = 4;
    AgentSpawned agent_spawned = 5;
    AgentMessage agent_message = 6;
    SessionComplete complete = 7;
    ErrorEvent error = 8;
    SessionHistory history = 9;
    Plan plan_proposed = 10;
    PlanStep plan_step_update = 11;
    FleetStatus fleet_status = 12;
    ContextCompressedEvent context_compressed = 13;
    AuthError auth_error = 14;
    ThinkingBlock thinking = 15;
  }
}

message ThinkingBlock {
  string content = 1;
}

message AuthError {
  string provider = 1;
  string alias = 2;
  string message = 3;
}

message ContextCompressedEvent {
  string session_id = 1;
  string summary = 2;      // short text summary of compressed messages
  int32 messages_removed = 3;
  int32 messages_kept = 4;
}

message TokenDelta {
  string content = 1;
}

message ToolCallStart {
  string tool_name = 1;
  string arguments_json = 2;
  string call_id = 3;
}

message ToolCallResult {
  string call_id = 1;
  string result_json = 2;
  bool success = 3;
}

message PermissionRequest {
  string request_id = 1;
  string tool_name = 2;
  string arguments_json = 3;
  string description = 4;
}

message PermissionResponse {
  string request_id = 1;
  bool allowed = 2;
  string scope = 3; // "once", "session", "always"
}

message AgentSpawned {
  string agent_id = 1;
  string agent_name = 2;
  string role = 3;
}

message AgentMessage {
  string from_agent = 1;
  string to_agent = 2;
  string content = 3;
}

message SessionComplete {
  string summary = 1;
  int32 total_tokens = 2;
}

message ErrorEvent {
  string message = 1;
  string code = 2;
}

message SessionHistory {
  repeated HistoryMessage messages = 1;
}

message HistoryMessage {
  string role = 1;
  string content = 2;
  string tool_name = 3;
  string tool_call_id = 4;
  google.protobuf.Timestamp timestamp = 5;
}

// Provider management
message AddProviderReq {
  string alias = 1;
  string type = 2;
  string model = 3;
  string api_key = 4;
  string base_url = 5;
  int32 max_tokens = 6;
  bool is_default = 7;
}

message Provider {
  string alias = 1;
  string type = 2;
  string model = 3;
  string base_url = 4;
  bool is_default = 5;
}

message ProviderList {
  repeated Provider providers = 1;
}

message TestProviderReq {
  string alias = 1;
}

message TestProviderResult {
  bool success = 1;
  string message = 2;
  int64 latency_ms = 3;
}

message RemoveProviderReq {
  string alias = 1;
}

message SetDefaultProviderReq {
  string alias = 1;
}

message UpdateProviderModelReq {
  string alias = 1;
  string model = 2;
}

// Agent management
message Agent {
  string id = 1;
  string name = 2;
  string role = 3;
  string status = 4;
  string model = 5;
  string provider = 6;
  string current_task = 7;
  string session_id = 8;
}

message AgentList {
  repeated Agent agents = 1;
}

message AgentStatusReq {
  string agent_id = 1;
}

// Team management
message StartTeamReq {
  string task = 1;
  string session_id = 2;
  string orchestrator_provider = 3;
  string team_config_name = 4; // optional: builtin name (e.g. "code-gen") or YAML path
}

message TeamEvent {
  oneof event {
    AgentSpawned agent_spawned = 1;
    AgentMessage agent_message = 2;
    TokenDelta token = 3;
    ToolCallStart tool_start = 4;
    ToolCallResult tool_result = 5;
    PermissionRequest permission = 6;
    SessionComplete complete = 7;
    ErrorEvent error = 8;
  }
}

message TeamStatusReq {
  string team_id = 1;
}

message TeamStatus {
  string team_id = 1;
  string task = 2;
  repeated Agent agents = 3;
  string status = 4;
}

// Plan mode
message PlanStep {
  string id = 1;
  string description = 2;
  string status = 3;  // pending, in_progress, completed, failed, skipped
  repeated string files = 4;
  string error = 5;
}

message Plan {
  string id = 1;
  string session_id = 2;
  string goal = 3;
  repeated PlanStep steps = 4;
  string status = 5;  // proposed, approved, executing, completed, rejected
  string created_at = 6;
  string feedback = 7;  // rejection feedback from user
}

message ApprovePlanReq {
  string session_id = 1;
  string plan_id = 2;
  repeated string skip_steps = 3;
}

message RejectPlanReq {
  string session_id = 1;
  string plan_id = 2;
  string feedback = 3;
}

// Cron scheduling
message CronJob {
  string id = 1;
  string session_id = 2;
  string schedule = 3;     // duration ("5m") or cron expr ("*/10 * * * *")
  string command = 4;      // slash command or prompt
  string status = 5;       // active, paused, stopped
  string last_run = 6;
  string next_run = 7;
  int32 run_count = 8;
}

message CreateCronReq {
  string session_id = 1;
  string schedule = 2;
  string command = 3;
}

message CronJobList { repeated CronJob jobs = 1; }
message CronJobReq { string job_id = 1; }

// Fleet mode
message StartFleetReq {
  string session_id = 1;
  string plan_id = 2;
  int32 max_workers = 3;
}

message FleetWorker {
  string id = 1;
  string name = 2;
  string step_id = 3;
  string status = 4;  // pending, running, completed, failed
  string model = 5;
  string provider = 6;
  string error = 7;
}

message FleetStatus {
  string fleet_id = 1;
  string session_id = 2;
  repeated FleetWorker workers = 3;
  string status = 4;  // running, completed, failed
  int32 completed = 5;
  int32 total = 6;
}

message FleetStatusReq { string fleet_id = 1; }
message KillFleetWorkerReq { string fleet_id = 1; string worker_id = 2; }

// Job control
message Job {
  string id = 1;
  string type = 2;      // session, fleet_worker, team_agent, cron, tool_exec
  string name = 3;
  string status = 4;    // running, paused, completed, failed, pending
  string session_id = 5;
  string started_at = 6;
  string elapsed = 7;
  map<string, string> metadata = 8;
}

message JobList { repeated Job jobs = 1; }
message JobReq { string job_id = 1; }

// Daemon health
message HealthResponse {
  bool healthy = 1;
  int32 active_sessions = 2;
  int32 active_agents = 3;
  string uptime = 4;
  string version = 5;
  string commit = 6;
  int32 proto_version = 7;
}

// Version check
message VersionCheckReq {
  string cli_version = 1;
  string cli_commit = 2;
  int32 cli_proto_version = 3;
}

message VersionCheckResp {
  bool compatible = 1;
  bool reload_recommended = 2;
  string daemon_version = 3;
  string message = 4;
}

// Reload
message ReloadReq {
  string new_binary_path = 1;
  string cli_version = 2;
}

message ReloadStatus {
  string status = 1;
  string message = 2;
}

// Agent mesh node registration
message RegisterNodeReq {
  string name = 1;
  string role = 2;
  string model = 3;
  string provider = 4;
  repeated string tools = 5;
}

message RegisterNodeResp {
  string node_id = 1;
}

// Blackboard sync between mesh peers
message BlackboardSync {
  string section = 1;
  string key = 2;
  bytes value = 3;
  string author = 4;
  int64 revision = 5;
}

// MeshEvent carries mesh-related events between daemons
message MeshEvent {
  oneof event {
    BlackboardSync blackboard_sync = 1;
    AgentMessage agent_message = 2;
    RegisterNodeResp node_registered = 3;
  }
}

// === Service ===

service RatchetDaemon {
  // Session management
  rpc CreateSession(CreateSessionReq) returns (Session);
  rpc ListSessions(Empty) returns (SessionList);
  rpc AttachSession(AttachReq) returns (stream ChatEvent);
  rpc DetachSession(DetachReq) returns (Empty);
  rpc KillSession(KillReq) returns (Empty);

  // Chat
  rpc SendMessage(SendMessageReq) returns (stream ChatEvent);

  // Permissions
  rpc RespondToPermission(PermissionResponse) returns (Empty);

  // Providers
  rpc AddProvider(AddProviderReq) returns (Provider);
  rpc ListProviders(Empty) returns (ProviderList);
  rpc TestProvider(TestProviderReq) returns (TestProviderResult);
  rpc RemoveProvider(RemoveProviderReq) returns (Empty);
  rpc SetDefaultProvider(SetDefaultProviderReq) returns (Empty);
  rpc UpdateProviderModel(UpdateProviderModelReq) returns (Empty);

  // Agents
  rpc ListAgents(Empty) returns (AgentList);
  rpc GetAgentStatus(AgentStatusReq) returns (Agent);

  // Teams
  rpc StartTeam(StartTeamReq) returns (stream TeamEvent);
  rpc GetTeamStatus(TeamStatusReq) returns (TeamStatus);

  // Plan mode
  rpc ApprovePlan(ApprovePlanReq) returns (stream ChatEvent);
  rpc RejectPlan(RejectPlanReq) returns (Empty);

  // Fleet mode
  rpc StartFleet(StartFleetReq) returns (stream ChatEvent);
  rpc GetFleetStatus(FleetStatusReq) returns (FleetStatus);
  rpc KillFleetWorker(KillFleetWorkerReq) returns (Empty);

  // Cron scheduling
  rpc CreateCron(CreateCronReq) returns (CronJob);
  rpc ListCrons(Empty) returns (CronJobList);
  rpc PauseCron(CronJobReq) returns (Empty);
  rpc ResumeCron(CronJobReq) returns (Empty);
  rpc StopCron(CronJobReq) returns (Empty);

  // Job control
  rpc ListJobs(Empty) returns (JobList);
  rpc PauseJob(JobReq) returns (Empty);
  rpc ResumeJob(JobReq) returns (Empty);
  rpc KillJob(JobReq) returns (Empty);

  // Daemon
  rpc Health(Empty) returns (HealthResponse);
  rpc Shutdown(Empty) returns (Empty);

  // Version and reload
  rpc CheckVersion(VersionCheckReq) returns (VersionCheckResp);
  rpc RequestReload(ReloadReq) returns (stream ReloadStatus);

  // Agent Mesh (scaffolded — handlers return Unimplemented)
  rpc RegisterMeshNode(RegisterNodeReq) returns (RegisterNodeResp);
  rpc MeshStream(stream MeshEvent) returns (stream MeshEvent);
}
